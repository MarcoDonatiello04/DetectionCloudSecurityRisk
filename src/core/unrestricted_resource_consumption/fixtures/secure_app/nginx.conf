# nginx.conf — SECURE
# RC-008: client_max_body_size configurato a livello http e server
# RC-009: proxy_read_timeout e proxy_connect_timeout configurati

events {
    worker_connections 1024;
}

http {
    # Limite globale body size (RC-008)
    client_max_body_size 10M;
    client_body_timeout 30s;

    server {
        listen 80;
        server_name example.com;

        location /api/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # Timeout configurati (RC-009)
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        location /upload {
            proxy_pass http://backend:8000;
            # Override per upload: body size più grande ma bounded
            client_max_body_size 50M;
            proxy_connect_timeout 10s;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }
    }
}
