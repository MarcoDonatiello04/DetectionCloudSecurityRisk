components:
  securitySchemes:
    BearerAuth:
      scheme: bearer
      type: http
    KeycloakAuth:
      description: Keycloak Local Authentication via Password flow
      flows:
        password:
          scopes:
            openid: Access standard openid claims
            profile: Access profile info
          tokenUrl: http://localhost:8080/realms/myrealm/protocol/openid-connect/token
      type: oauth2
info:
  description: A mock API with intentional security flaws for Checkov testing.
  title: Vulnerable API
  version: 1.0.0
openapi: 3.0.0
paths:
  /admin:
    get:
      responses:
        '200':
          description: OK
      summary: Admin Area
  /api/orders/{order_id}:
    get:
      description: Retrieve details for a specific order. Volontariamente vulnerabile
        a BOLA.
      parameters:
      - description: L'ID dell'ordine da recuperare
        in: path
        name: order_id
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK - Ordine recuperato con successo
        '401':
          description: Unauthorized - Token mancante o non valido
        '403':
          description: Forbidden - Accesso non autorizzato (in caso di patch BOLA
            attiva)
        '404':
          description: Not Found - Ordine non trovato
      security:
      - KeycloakAuth: []
      summary: Get order details
  /api/v1/debug/dump-database:
    post:
      description: 'Rilevato a runtime (Classificazione: RUNTIME_ONLY, Confidence:
        0.7).'
      parameters:
      - description: Parametro query osservato a runtime
        in: query
        name: token
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Risposta osservata con status 200
      summary: Endpoint POST rilevato (Non Documentato)
  /debug:
    get:
      responses:
        '200':
          description: OK
      summary: Debug endpoint
  /login:
    get:
      description: 'Rilevato a runtime (Classificazione: CONFIRMED, Confidence: 1.0).'
      responses:
        '404':
          description: Risposta osservata con status 404
      summary: Endpoint GET rilevato (Non Documentato)
    post:
      requestBody:
        content:
          application/json:
            schema:
              properties:
                password:
                  type: string
                username:
                  type: string
              type: object
      responses:
        '200':
          description: OK
      summary: Login endpoint
  /notes:
    get:
      description: 'Rilevato a runtime (Classificazione: CONFIRMED, Confidence: 1.0).'
      responses:
        '404':
          description: Risposta osservata con status 404
      summary: Endpoint GET rilevato (Non Documentato)
    post:
      requestBody:
        content:
          application/json:
            schema:
              properties:
                content:
                  type: string
                id:
                  type: string
              type: object
      responses:
        '200':
          description: OK
      summary: Add a note
  /robots.txt:
    get:
      description: 'Rilevato a runtime (Classificazione: RUNTIME_ONLY, Confidence:
        0.7).'
      responses:
        '404':
          description: Risposta osservata con status 404
      summary: Endpoint GET rilevato (Non Documentato)
  /search:
    get:
      parameters:
      - in: query
        name: q
        schema:
          type: string
      responses:
        '200':
          description: OK
      summary: Search endpoint
  /sitemap.xml:
    get:
      description: 'Rilevato a runtime (Classificazione: RUNTIME_ONLY, Confidence:
        0.7).'
      responses:
        '404':
          description: Risposta osservata con status 404
      summary: Endpoint GET rilevato (Non Documentato)
  /upload:
    get:
      description: 'Rilevato a runtime (Classificazione: CONFIRMED, Confidence: 1.0).'
      responses:
        '404':
          description: Risposta osservata con status 404
      summary: Endpoint GET rilevato (Non Documentato)
    post:
      requestBody:
        content:
          application/json:
            schema:
              properties:
                content:
                  type: string
                filename:
                  type: string
              type: object
      responses:
        '200':
          description: OK
      summary: Upload file
  /users:
    get:
      responses:
        '200':
          description: A JSON array of user names
      summary: Get list of users
  /users/{id}:
    get:
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        '200':
          description: User found
      summary: Get user by ID
