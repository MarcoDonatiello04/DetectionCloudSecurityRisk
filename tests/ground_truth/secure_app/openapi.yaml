openapi: "3.0.3"
info:
  title: Secure Auth API (Ground-Truth Target)
  version: "1.0.0"
  description: >
    Secure Flask API for blind security scanner validation (False Positive Rate target).
    The scanner must NOT flag any of the 5 auth categories as vulnerable here.

servers:
  - url: http://localhost:5002

paths:
  /api/login:
    post:
      summary: Authenticate and obtain a JWT
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  example: testuser
                password:
                  type: string
                  example: testpass123
      responses:
        "200":
          description: Successful login – returns a JWT
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:    { type: string }
                  username: { type: string }
                  role:     { type: string }
        "401":
          description: Invalid credentials (uniform message)
        "429":
          description: Too many failed attempts

  /api/profile:
    get:
      summary: Return the authenticated user's profile
      operationId: getProfile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profile data
          content:
            application/json:
              schema:
                type: object
                properties:
                  username: { type: string }
                  role:     { type: string }
                  profile:  { type: string }
        "401":
          description: Missing, invalid, or expired token
        "404":
          description: User not found

  /api/refresh:
    post:
      summary: Refresh the JWT token
      operationId: refreshToken
      security:
        - bearerAuth: []
      responses:
        "200":
          description: New JWT token
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
        "401":
          description: Missing, invalid, or expired token

  /api/logout:
    post:
      summary: Invalidate the current session
      operationId: logout
      responses:
        "200":
          description: Logged out

  /api/admin:
    get:
      summary: Admin-only endpoint (cookie-session protected)
      operationId: adminArea
      responses:
        "200":
          description: Admin welcome message
        "403":
          description: Forbidden

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
