services:
  # ===========================================================================
  # 1. MITMPROXY CENTRAL PROXY
  # ===========================================================================
  mitmproxy:
    image: mitmproxy/mitmproxy:latest
    container_name: tesi-mitmproxy
    volumes:
      - ./soluzione_api/src/runtime/mitmproxy:/home/mitmproxy/scripts
      - ./soluzione_api/src/output:/home/mitmproxy/output
    command: mitmdump -s /home/mitmproxy/scripts/addon.py -p 8081 --mode regular --ssl-insecure
    ports:
      - "8081:8081"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ===========================================================================
  # 3. OWASP ZAP DAST ENGINE (Runtime Verification Oracle)
  # ===========================================================================
  owasp-zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: tesi-owasp-zap
    user: root  # Permette permessi di scrittura completi nel volume se necessario
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      zap.sh -daemon -host 0.0.0.0 -port 8080 
      -config api.disablekey=true 
      -config api.addrs.addr.name=.* 
      -config api.addrs.addr.regex=true
      -config connection.proxyChain.enabled=true
      -config connection.proxyChain.hostName=tesi-mitmproxy
      -config connection.proxyChain.port=8081
    ports:
      - "8080:8080"
    depends_on:
      - mitmproxy
