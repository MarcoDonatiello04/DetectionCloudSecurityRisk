services:
  # ===========================================================================
  # 1. LOCALSTACK ENGINE (Cloud Infrastructure Mock)
  # ===========================================================================
  localstack:
    image: localstack/localstack:latest
    container_name: tesi-localstack
    ports:
      - "4566:4566"            # Edge port standard
      - "4510-4559:4510-4559"  # Servizi estesi
    environment:
      - SERVICES=s3,iam,ec2,kms
      - DEBUG=1
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - "./localstack_data:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"

  # ===========================================================================
  # 2. TARGET VULNERABLE APP (API POC con Injection e Shadow API)
  # ===========================================================================
  target-app:
    image: python:3.11-slim
    container_name: tesi-target-app
    working_dir: /app
    volumes:
      - "./tests/target_poc:/app"
    command: >
      bash -c "pip install --no-cache-dir flask && flask --app app.py run --host=0.0.0.0 --port=5000"
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development

  # ===========================================================================
  # 3. OWASP ZAP DAST ENGINE (Runtime Verification Oracle)
  # ===========================================================================
  owasp-zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: tesi-owasp-zap
    user: root  # Permette permessi di scrittura completi nel volume se necessario
    command: >
      zap.sh -daemon -host 0.0.0.0 -port 8080 
      -config api.disablekey=true 
      -config api.addrs.addr.name=.* 
      -config api.addrs.addr.regex=true
    ports:
      - "8080:8080"
