openapi: 3.0.0
info:
  title: Vulnerable API
  version: 1.0.0
  description: A mock API with intentional security flaws for Checkov testing.

# CKV_OPENAPI_2: Ensure that security definitions are present
# CKV_OPENAPI_4: Ensure that API operates over HTTPS (here HTTP is used)
# servers removed to let ZAP use the target URL directly

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer

paths:
  /users:
    get:
      summary: Get list of users
      responses:
        "200":
          description: A JSON array of user names

  /users/{id}:
    get:
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User found

  /login:
    post:
      summary: Login endpoint
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: OK

  /admin:
    get:
      summary: Admin Area
      responses:
        "200":
          description: OK

  /upload:
    post:
      summary: Upload file
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                filename:
                  type: string
                content:
                  type: string
      responses:
        "200":
          description: OK

  /search:
    get:
      summary: Search endpoint
      parameters:
        - name: q
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK

  /debug:
    get:
      summary: Debug endpoint
      responses:
        "200":
          description: OK

  /notes:
    post:
      summary: Add a note
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                content:
                  type: string
      responses:
        "200":
          description: OK
